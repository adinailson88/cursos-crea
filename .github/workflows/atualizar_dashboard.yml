name: Atualizar dashboard CREA-BA

on:
  workflow_dispatch: {}
  push:
    branches: [master]
    paths:
      - "dados/fonte/**"
      - "scripts/**"

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install openpyxl

      - name: Gerar planilha normalizada (dados/fonte -> planilha/Base_IES_Cursos_CREA_BA.xlsx)
        run: python scripts/gerar_base.py

      - name: Gerar dados.json (planilha -> dados/dados.json)
        run: python scripts/gerar_json.py

      - name: Validar dados (dados/validacao.json)
        run: python scripts/validar_dados.py

      - name: Commit e push se houve alteração
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add planilha/Base_IES_Cursos_CREA_BA.xlsx dados/dados.json dados/validacao.json
          if git diff --cached --quiet; then
            echo "Nenhuma alteração nos dados gerados."
          else
            git commit -m "Atualiza dashboard a partir de dados/fonte/ (execução automática)"
            git push
          fi
